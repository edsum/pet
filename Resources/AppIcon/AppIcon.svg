<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主渐变：暖橙到金黄（治愈感） -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <!-- 高光渐变（左上角的光泽） -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- 软阴影 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角矩形背景（iOS Squircle 形状由系统应用，这里用标准圆角） -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1024" height="512" rx="225" ry="225" fill="url(#highlight)"/>

  <!-- 宠物身体（圆滚滚的椭圆，居中略偏下） -->
  <g filter="url(#softShadow)">
    <!-- 身体 -->
    <ellipse cx="512" cy="560" rx="280" ry="250" fill="#FFE4C4"/>
    <!-- 耳朵（左） -->
    <path d="M 320,380 Q 290,300 360,290 Q 400,340 380,420 Z" fill="#FFE4C4"/>
    <!-- 耳朵（右） -->
    <path d="M 704,380 Q 734,300 664,290 Q 624,340 644,420 Z" fill="#FFE4C4"/>
    <!-- 耳朵内（粉色） -->
    <path d="M 335,360 Q 320,320 355,315 Q 380,345 370,395 Z" fill="#FFB6B6"/>
    <path d="M 689,360 Q 704,320 669,315 Q 644,345 654,395 Z" fill="#FFB6B6"/>
  </g>

  <!-- 脸部细节（眼睛 + 嘴 + 红晕） -->
  <g>
    <!-- 左眼 -->
    <ellipse cx="430" cy="530" rx="28" ry="34" fill="#3D2817"/>
    <circle cx="438" cy="520" r="8" fill="#FFFFFF"/>
    <!-- 右眼 -->
    <ellipse cx="594" cy="530" rx="28" ry="34" fill="#3D2817"/>
    <circle cx="602" cy="520" r="8" fill="#FFFFFF"/>
    <!-- 鼻子 -->
    <ellipse cx="512" cy="585" rx="14" ry="10" fill="#3D2817"/>
    <!-- 嘴（笑） -->
    <path d="M 470,610 Q 512,650 554,610" stroke="#3D2817" stroke-width="6"
          stroke-linecap="round" fill="none"/>
    <!-- 红晕 -->
    <ellipse cx="380" cy="600" rx="34" ry="20" fill="#FFB6B6" opacity="0.6"/>
    <ellipse cx="644" cy="600" rx="34" ry="20" fill="#FFB6B6" opacity="0.6"/>
  </g>

  <!-- 装饰：右下角小爪印（点睛） -->
  <g opacity="0.85" transform="translate(800, 800)">
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#FFFFFF"/>
    <ellipse cx="-30" cy="-30" rx="10" ry="13" fill="#FFFFFF"/>
    <ellipse cx="30" cy="-30" rx="10" ry="13" fill="#FFFFFF"/>
    <ellipse cx="-45" cy="0" rx="10" ry="13" fill="#FFFFFF"/>
    <ellipse cx="45" cy="0" rx="10" ry="13" fill="#FFFFFF"/>
  </g>

  <!-- 装饰：左上角闪光（活力感） -->
  <g opacity="0.7" transform="translate(220, 240)" fill="#FFFFFF">
    <path d="M 0,-30 L 8,-8 L 30,0 L 8,8 L 0,30 L -8,8 L -30,0 L -8,-8 Z"/>
  </g>
</svg>
